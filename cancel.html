<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Order Cancelled — TasteBueno</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" href="/favicon.png" type="image/png">
  <link rel="stylesheet" href="/css/site.css">
</head>
<body>
<header class="nav">
  <div class="container nav-inner">
    <a href="/" class="nav-logo"><img src="/images/logo-light-bg.png" alt="TasteBueno" height="36"></a>
  </div>
</header>
<div class="result-page">
  <div class="result-card">
    <div class="result-icon cancel">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </div>
    <h1>Order Cancelled</h1>
    <p>No worries — your cart is still saved. Head back when you're ready. If you had any trouble checking out, email us at <a href="mailto:hello@tastebueno.com" style="color:var(--red);font-weight:600;">hello@tastebueno.com</a></p>
    <div class="result-actions">
      <a href="/shop.html" class="btn btn-primary">Back to Shop</a>
      <a href="/custom.html" class="btn btn-outline">Design a Stencil</a>
    </div>
  </div>
</div>
<script>fetch("/api/track",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({page:location.pathname,ref:document.referrer})});</script>
</body>
</html>
